<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | MAC-METRIC 08</title>
    <link rel="stylesheet" href="/static/css/base.css">
    <link rel="stylesheet" href="/static/css/login.css">
</head>
<body class="login-body">
    <div class="login-wrapper">
        <div class="login-card">
            <div class="login-brand">
                <div class="login-brand-accent"></div>
                <h1>MAC-METRIC 08</h1>
                <p>Sistema de control operativo para Módulos de Atención Ciudadana</p>
            </div>

            <div class="login-header">
                <h2>Iniciar sesión</h2>
                <p class="login-subtitle">
                    Acceso al sistema institucional
                </p>
            </div>

            <div class="db-status db-status-ok">
                Estado de base de datos: <strong>{{ db_status }}</strong>
            </div>

            {% if message %}
            <div class="login-message login-message-{{ message_type }}">
                {{ message }}
            </div>
            {% endif %}

            <form method="post" action="/login" class="login-form">
                <div class="form-group">
                    <label for="username">Usuario</label>
                    <input type="text" id="username" name="username" required>
                </div>

                <div class="form-group">
                    <label for="password">Contraseña</label>
                    <input type="password" id="password" name="password" required>
                </div>

                <button type="submit" class="login-btn">Ingresar</button>
            </form>
        </div>
    </div>
</body>
</html>
