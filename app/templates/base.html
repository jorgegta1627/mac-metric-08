<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MAC-METRIC 08</title>

    <!-- BOOTSTRAP (esto te falta) -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- TU CSS -->
    <link rel="stylesheet" href="/static/css/base.css">
    <link rel="stylesheet" href="/static/css/dashboard.css">
</head>

<body class="bg-light">

<nav class="navbar navbar-dark bg-dark">
    <div class="container d-flex justify-content-between">

        <span class="navbar-brand mb-0 h1">MAC-METRIC 08</span>

        <div class="d-flex align-items-center gap-3">
            <a href="/dashboard" class="btn btn-sm btn-outline-light">
                Dashboard
            </a>

            {% if role_id|string == '1' %}
                <a href="/admin/usuarios" class="btn btn-sm btn-warning">
                    Administración
                </a>
            {% endif %}

            <span class="text-light small">
                {{ current_user }}
            </span>

            <a href="/logout" class="btn btn-sm btn-danger">
                Cerrar sesión
            </a>
        </div>
    </div>
</nav>

    <main class="container my-4">
        {% block content %}{% endblock %}
    </main>

</body>
</html>
